<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardFrac — Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Share Tech Mono',monospace;text-transform:uppercase;background:#080500;color:#ffd8a8;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .container{max-width:400px}
    .logo{font-size:1.4rem;font-weight:800;color:#ff8c14;letter-spacing:3px;margin-bottom:32px;text-shadow:0 0 12px rgba(255,140,20,.4)}
    .status{font-size:.75rem;color:#8a5a30;letter-spacing:.15em;margin-bottom:24px}
    h1{font-size:1.1rem;color:#ff8c14;margin-bottom:12px;letter-spacing:.08em}
    p{font-size:.82rem;color:#8a5a30;line-height:1.7;margin-bottom:24px}
    .btn{display:inline-block;padding:10px 24px;border:1px solid #ff8c14;color:#ff8c14;font-family:'Share Tech Mono',monospace;font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;background:transparent;transition:all .15s}
    .btn:hover{background:#ff8c14;color:#080500}
    .blink{animation:blink 1s step-end infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">[CARDFRAC_SYS]</div>
    <div class="status">// CONNECTION_LOST <span class="blink">_</span></div>
    <h1>You're Offline</h1>
    <p>No network connection detected. Check your connection and try again — your collection data is safe.</p>
    <button class="btn" onclick="window.location.reload()">Retry_Connection</button>
  </div>
</body>
</html>
