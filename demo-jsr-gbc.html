<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GG FM 89.1 — Jet Set Radio × Game Boy Color</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  background:#06000a;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Press Start 2P','Courier New',monospace;
  overflow:hidden;
  position:relative;
  gap:10px;
}

/* ── Background ──────────────────────────────────────────── */
.bg-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:0;
}
/* Y2K perspective grid floor */
.bg-grid{
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(123,95,204,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(123,95,204,0.07) 1px,transparent 1px);
  background-size:28px 28px;
  transform:perspective(360px) rotateX(52deg) scale(2.2);
  transform-origin:50% 100%;
  bottom:-10%;
}
/* Glow orbs */
.orb{position:absolute;border-radius:50%;filter:blur(100px);}
.orb-a{width:420px;height:420px;background:#FF0080;top:-140px;left:-100px;opacity:.11;}
.orb-b{width:380px;height:380px;background:#00FFCC;bottom:-120px;right:-80px;opacity:.09;}
.orb-c{width:260px;height:260px;background:#FFE000;top:40%;left:5%;opacity:.07;}
/* Giant graffiti tag text */
.bg-tag{
  position:absolute;
  font-family:'Press Start 2P',monospace;
  color:#FF0080;
  opacity:.045;
  user-select:none;
  pointer-events:none;
  line-height:1;
}
.bg-tag-gg{font-size:200px;top:-20px;left:-10px;transform:rotate(-7deg);letter-spacing:-12px;}
.bg-tag-jsr{font-size:55px;bottom:30px;right:15px;transform:rotate(5deg);color:#00FFCC;opacity:.04;}
.bg-tag-fm{font-size:30px;top:10%;right:8%;color:#FFE000;transform:rotate(-3deg);opacity:.035;}
/* Subtle body scanlines */
.bg-scan{
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    0deg,transparent 0,transparent 3px,
    rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px
  );
}
/* Floating star shapes */
.star{
  position:absolute;
  font-family:monospace;
  color:#FFE000;
  opacity:.08;
  animation:floatStar 8s ease-in-out infinite;
  pointer-events:none;
}
@keyframes floatStar{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

/* ── Page title ──────────────────────────────────────────── */
.page-header{
  position:relative;
  z-index:10;
  text-align:center;
}
.page-header-top{
  font-size:6px;
  letter-spacing:5px;
  color:rgba(255,0,128,.5);
  margin-bottom:3px;
}
.page-header-main{
  font-size:11px;
  letter-spacing:2px;
  color:#fff;
  text-shadow:0 0 30px rgba(255,0,128,.6),0 0 60px rgba(255,0,128,.3);
}
.page-header-sub{
  font-size:5px;
  letter-spacing:6px;
  color:rgba(0,255,204,.5);
  margin-top:4px;
}

/* ── GameBoy Color shell ─────────────────────────────────── */
.gbc{
  position:relative;
  z-index:10;
  width:258px;
  /* Atomic Purple translucent GBC look */
  background:
    linear-gradient(135deg,rgba(255,255,255,.2) 0%,rgba(255,255,255,0) 45%),
    linear-gradient(160deg,#9d82ec 0%,#7c5fcc 30%,#5c3eb0 68%,#3d2490 100%);
  border-radius:14px 14px 60px 14px;
  padding:14px 13px 24px;
  box-shadow:
    0 0 0 1.5px #2b1c7a,
    0 0 0 3px rgba(155,130,236,.28),
    0 36px 90px rgba(0,0,0,.9),
    inset 0 1.5px 0 rgba(255,255,255,.28),
    inset 0 -2px 0 rgba(0,0,0,.35);
}
/* Top-right corner notch */
.gbc::before{
  content:'';
  position:absolute;
  top:0;right:0;
  width:38px;height:38px;
  background:#06000a;
  border-radius:0 14px 0 0;
  box-shadow:inset -1px -1px 0 rgba(155,130,236,.25);
}

/* ── Screen housing ──────────────────────────────────────── */
.screen-housing{
  background:#10102a;
  border-radius:8px 8px 28px 28px;
  padding:8px 9px 14px;
  margin-bottom:7px;
  border:2px solid #0a0a1e;
  box-shadow:
    inset 0 2px 8px rgba(0,0,0,.65),
    0 0 0 1px rgba(155,130,236,.12);
}
.screen-label{
  font-size:4.5px;
  text-align:center;
  color:rgba(155,130,236,.45);
  letter-spacing:3.5px;
  margin-bottom:5px;
}
/* Power LED row */
.led-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  margin-bottom:6px;
}
.power-led{
  width:5px;height:5px;
  border-radius:50%;
  background:#00ff41;
  box-shadow:0 0 5px #00ff41,0 0 10px rgba(0,255,65,.45);
  animation:ledGlow 2.2s ease-in-out infinite;
}
@keyframes ledGlow{
  0%,100%{opacity:1;box-shadow:0 0 5px #00ff41,0 0 12px rgba(0,255,65,.5);}
  50%{opacity:.55;box-shadow:0 0 2px #00ff41;}
}
.led-label{
  font-size:3.5px;
  color:rgba(155,130,236,.3);
  letter-spacing:2px;
}

/* ── LCD screen ──────────────────────────────────────────── */
.screen{
  width:100%;
  height:150px;
  background:#030007;
  border:2.5px solid #000;
  position:relative;
  overflow:hidden;
}
/* Scanline overlay */
.screen::after{
  content:'';
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    0deg,transparent 0,transparent 1px,
    rgba(0,0,0,.2) 1px,rgba(0,0,0,.2) 2px
  );
  z-index:50;
  pointer-events:none;
}
/* Pixel grid */
.screen::before{
  content:'';
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    90deg,transparent 0,transparent 2px,
    rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 3px
  );
  z-index:49;
  pointer-events:none;
}

/* ── Screen inner content ────────────────────────────────── */
.screen-inner{
  position:absolute;
  inset:0;
  padding:6px 7px 5px;
  display:flex;
  flex-direction:column;
  gap:3px;
  z-index:10;
}
/* Station bar */
.station-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,0,128,.3);
  padding-bottom:3px;
}
.station-name{font-size:5px;color:#FF0080;letter-spacing:1.5px;}
.station-freq{font-size:5px;color:#00FFCC;letter-spacing:1px;}
/* Track section */
.track-section{
  flex:1;
  display:flex;
  gap:5px;
  align-items:flex-start;
  min-height:0;
}
.track-info{
  flex:1;min-width:0;
  display:flex;flex-direction:column;gap:3px;
}
.np-label{
  font-size:4px;
  color:rgba(255,224,0,.6);
  letter-spacing:2px;
}
.track-name-wrap{overflow:hidden;white-space:nowrap;}
.track-name{
  font-size:6.5px;
  color:#fff;
  display:inline-block;
  white-space:nowrap;
}
.track-name.scrolling{animation:marquee 7s linear infinite;}
@keyframes marquee{0%{transform:translateX(130px)}100%{transform:translateX(-100%)}}
.artist-name{
  font-size:5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  transition:color .4s;
}
/* Pixel character canvas */
.px-char{
  width:28px;height:40px;
  flex-shrink:0;
  image-rendering:pixelated;
  margin-top:-2px;
}
.px-char canvas{
  width:28px;height:40px;
  image-rendering:pixelated;
  display:block;
}
/* Visualizer */
.viz-wrap{
  height:26px;
  display:flex;
  align-items:flex-end;
  gap:1.5px;
}
.viz-bar{
  flex:1;
  min-height:2px;
  border-radius:1px 1px 0 0;
  transition:height .06s ease-out;
}
/* Progress bar */
.prog-track{
  height:3px;
  background:rgba(255,255,255,.08);
  border-radius:2px;
  overflow:hidden;
}
.prog-fill{
  height:100%;
  border-radius:2px;
  background:linear-gradient(90deg,#FF0080,#00FFCC);
  transition:width .9s linear;
  width:0%;
}
/* Bottom status */
.status-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.time-disp{font-size:5px;color:#00FFCC;}
.bpm-disp{font-size:5px;color:#FFE000;transition:color .4s;}
/* Tag flash */
.tag-flash{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:900;
  z-index:40;
  pointer-events:none;
  opacity:0;
  text-shadow:0 0 20px currentColor;
}
/* Pause overlay */
.pause-overlay{
  position:absolute;
  inset:0;
  background:rgba(3,0,7,.75);
  z-index:35;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:8px;
  color:#FFE000;
  letter-spacing:3px;
  text-shadow:0 0 14px rgba(255,224,0,.5);
}
.pause-overlay.on{display:flex;}

/* ── GBC logo ────────────────────────────────────────────── */
.gbc-logo{
  text-align:center;
  font-size:5px;
  color:rgba(155,130,236,.35);
  letter-spacing:4px;
  margin:4px 0 7px;
}

/* ── Controls row ────────────────────────────────────────── */
.controls-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 4px;
}
/* D-Pad */
.dpad{
  width:64px;height:64px;
  position:relative;
  flex-shrink:0;
}
.dp-arm{
  position:absolute;
  background:#1a0e4a;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 3px 6px rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:2px;
  transition:background .08s,transform .08s;
  -webkit-tap-highlight-color:transparent;
}
.dp-arm:active{background:#110840;transform:scale(.96);}
.dp-h{width:64px;height:22px;top:21px;left:0;}
.dp-v{width:22px;height:64px;top:0;left:21px;}
.dp-ctr{
  position:absolute;
  width:22px;height:22px;
  top:21px;left:21px;
  background:#130a38;
  border-radius:2px;
  z-index:2;
}
.dp-arrow{
  font-size:7px;
  color:rgba(155,130,236,.45);
  position:absolute;
  line-height:1;
  pointer-events:none;
}
/* A/B buttons */
.ab-wrap{
  display:flex;flex-direction:column;gap:7px;align-items:center;
  transform:rotate(-20deg);
}
.btn-ab{
  width:30px;height:30px;
  border-radius:50%;border:none;
  cursor:pointer;
  font-family:'Press Start 2P',monospace;
  font-size:7.5px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 0 rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.3);
  transition:transform .08s,box-shadow .08s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.btn-ab:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.55);}
.btn-a{background:linear-gradient(145deg,#FF3066,#CC0040);color:rgba(255,255,255,.92);}
.btn-b{background:linear-gradient(145deg,#3366FF,#0040CC);color:rgba(255,255,255,.92);}

/* ── Start / Select ──────────────────────────────────────── */
.menu-row{
  display:flex;
  justify-content:center;
  gap:18px;
  margin:6px 0 4px;
}
.menu-btn{
  width:40px;height:11px;
  background:#1a0e4a;
  border:none;border-radius:6px;
  cursor:pointer;
  font-family:'Press Start 2P',monospace;
  font-size:3.5px;
  color:rgba(155,130,236,.45);
  letter-spacing:.5px;
  box-shadow:0 2.5px 0 rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06);
  transition:transform .08s;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.menu-btn:active{transform:translateY(1.5px);box-shadow:0 1px 0 rgba(0,0,0,.45);}

/* ── Speaker grille ──────────────────────────────────────── */
.speaker{
  position:absolute;
  bottom:28px;right:16px;
  display:grid;
  grid-template-columns:repeat(6,4px);
  grid-template-rows:repeat(3,4px);
  gap:3px;
}
.sp-dot{
  width:4px;height:4px;
  border-radius:50%;
  background:#110840;
  box-shadow:inset 0 1px 0 rgba(0,0,0,.6);
}
/* Animated speaker dots when music plays */
.sp-dot.pulse{
  animation:spkPulse .3s ease-in-out alternate infinite;
  animation-delay:calc(var(--i) * .05s);
}
@keyframes spkPulse{
  0%{background:#110840;}
  100%{background:#1e0e5a;}
}

/* ── Spray particles ─────────────────────────────────────── */
.spray-p{
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  z-index:200;
  animation:sprayFly var(--dur) ease-out forwards;
}
@keyframes sprayFly{
  0%{transform:translate(0,0) scale(1.3);opacity:.95;}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}
}

/* ── Hint text ───────────────────────────────────────────── */
.hint{
  position:relative;z-index:10;
  font-size:4.5px;
  color:rgba(155,130,236,.3);
  letter-spacing:2.5px;
  text-align:center;
}
</style>
</head>
<body>

<!-- Background layer -->
<div class="bg-layer">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>
  <div class="bg-grid"></div>
  <div class="bg-scan"></div>
  <div class="bg-tag bg-tag-gg" aria-hidden="true">GG</div>
  <div class="bg-tag bg-tag-jsr" aria-hidden="true">JSR</div>
  <div class="bg-tag bg-tag-fm" aria-hidden="true">FM</div>
  <div class="star" style="font-size:18px;top:12%;right:20%;animation-delay:-2s" aria-hidden="true">★</div>
  <div class="star" style="font-size:11px;top:68%;left:15%;animation-delay:-5s" aria-hidden="true">★</div>
  <div class="star" style="font-size:14px;top:28%;left:28%;animation-delay:-1s" aria-hidden="true">★</div>
  <div class="star" style="font-size:9px;bottom:20%;right:28%;animation-delay:-4s;color:#00FFCC" aria-hidden="true">★</div>
</div>

<!-- Page header -->
<div class="page-header">
  <div class="page-header-top">★ RUDGER GRUVE PRODUCTIONS ★</div>
  <div class="page-header-main">GG FM 89.1</div>
  <div class="page-header-sub">JET SET RADIO × GAME BOY COLOR</div>
</div>

<!-- GameBoy Color -->
<div class="gbc" id="gbc">

  <!-- Screen housing -->
  <div class="screen-housing">
    <div class="screen-label">GAME BOY COLOR</div>
    <div class="led-row">
      <div class="power-led"></div>
      <span class="led-label">POWER</span>
    </div>

    <div class="screen">
      <!-- Overlays -->
      <div class="pause-overlay" id="pauseOverlay">II PAUSE</div>
      <div class="tag-flash" id="tagFlash"></div>

      <!-- Content -->
      <div class="screen-inner">
        <div class="station-bar">
          <span class="station-name" id="stationBlink">&#9679; GG FM</span>
          <span class="station-freq">89.1 MHz</span>
        </div>

        <div class="track-section">
          <div class="track-info">
            <div class="np-label">NOW PLAYING</div>
            <div class="track-name-wrap">
              <span class="track-name" id="trackName">Loading...</span>
            </div>
            <div class="artist-name" id="artistName"></div>
          </div>
          <div class="px-char">
            <canvas id="charCanvas" width="14" height="20"></canvas>
          </div>
        </div>

        <div class="viz-wrap" id="vizWrap"></div>

        <div class="prog-track">
          <div class="prog-fill" id="progFill"></div>
        </div>

        <div class="status-bar">
          <span class="time-disp" id="timeDisp">0:00</span>
          <span class="bpm-disp" id="bpmDisp">&#9834; --- BPM</span>
        </div>
      </div>
    </div>
  </div>

  <!-- GBC logo -->
  <div class="gbc-logo">&#9733; GG COLOR &#9733;</div>

  <!-- Controls -->
  <div class="controls-row">
    <!-- D-Pad -->
    <div class="dpad">
      <div class="dp-arm dp-h" id="dpLeft">
        <span class="dp-arrow" style="left:4px;top:50%;transform:translateY(-50%)">&#9664;</span>
        <span class="dp-arrow" style="right:4px;top:50%;transform:translateY(-50%)">&#9654;</span>
      </div>
      <div class="dp-arm dp-v" id="dpUp">
        <span class="dp-arrow" style="top:4px;left:50%;transform:translateX(-50%)">&#9650;</span>
        <span class="dp-arrow" style="bottom:4px;left:50%;transform:translateX(-50%)">&#9660;</span>
      </div>
      <div class="dp-ctr"></div>
    </div>

    <!-- A / B -->
    <div class="ab-wrap">
      <button class="btn-ab btn-a" id="btnA" aria-label="Next track">A</button>
      <button class="btn-ab btn-b" id="btnB" aria-label="Previous track">B</button>
    </div>
  </div>

  <!-- Start / Select -->
  <div class="menu-row">
    <button class="menu-btn" id="btnSelect" aria-label="Select">SELECT</button>
    <button class="menu-btn" id="btnStart" aria-label="Start / Pause">START</button>
  </div>

  <!-- Speaker grille -->
  <div class="speaker" id="speaker"></div>
</div>

<!-- Hint -->
<div class="hint">A=NEXT &nbsp;&#9733;&nbsp; B=PREV &nbsp;&#9733;&nbsp; START=PAUSE</div>

<script>
// ── Track data ────────────────────────────────────────────────────
const TRACKS = [
  {name:'Birthday Cake',   artist:'Deavid Soul',   bpm:132, dur:187, color:'#FF0080', tag:'★CAKE★'},
  {name:'Rock It On',      artist:'Deavid Soul',   bpm:128, dur:213, color:'#FF6600', tag:'ROCK!'},
  {name:'Bout The City',   artist:'Guitar Vader',  bpm:140, dur:195, color:'#00FFCC', tag:'GG GANG'},
  {name:'Sweet Soul Bro',  artist:'Rize',          bpm:118, dur:224, color:'#FFE000', tag:'PEACE♪'},
  {name:'Funky Dealer',    artist:'Deavid Soul',   bpm:135, dur:201, color:'#FF0080', tag:'DEAL!'},
  {name:'Grace & Glory',   artist:'Deavid Soul',   bpm:122, dur:218, color:'#9B7FE8', tag:'GG FM'},
  {name:'Sneakman',        artist:'Tokyo-To Trio', bpm:110, dur:239, color:'#00FF41', tag:'SNEAK'},
  {name:'Teknopathetic',   artist:'Hideki N.',     bpm:144, dur:198, color:'#FF3399', tag:'TEKNO'},
];

let curIdx = 0, paused = false, elapsed = 0;

// ── Speaker dots ──────────────────────────────────────────────────
const spkEl = document.getElementById('speaker');
for (let i = 0; i < 18; i++) {
  const d = document.createElement('div');
  d.className = 'sp-dot';
  d.style.setProperty('--i', i);
  spkEl.appendChild(d);
}
function setSpeakerPulse(on) {
  spkEl.querySelectorAll('.sp-dot').forEach((d,i) => {
    d.classList.toggle('pulse', on && i % 3 === 0);
  });
}

// ── Pixel character ───────────────────────────────────────────────
// 14×20 pixel skater/Beat-inspired character
function drawChar(accentColor) {
  const cv = document.getElementById('charCanvas');
  if (!cv) return;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, 14, 20);
  const a = accentColor;

  // Hair
  ctx.fillStyle = a;
  ctx.fillRect(3,0,8,3);
  ctx.fillRect(2,1,1,2);

  // Head
  ctx.fillStyle = '#e8b88a';
  ctx.fillRect(3,2,8,5);

  // Goggles
  ctx.fillStyle = a;
  ctx.fillRect(3,4,3,2);
  ctx.fillRect(8,4,3,2);
  ctx.fillStyle = 'rgba(0,255,204,.7)';
  ctx.fillRect(4,4,2,2);
  ctx.fillRect(9,4,2,2);
  // goggle bridge
  ctx.fillStyle = '#ccc';
  ctx.fillRect(7,5,1,1);

  // Neck
  ctx.fillStyle = '#e8b88a';
  ctx.fillRect(6,7,2,1);

  // Body/jacket
  ctx.fillStyle = '#fff';
  ctx.fillRect(3,8,8,5);
  ctx.fillStyle = a;
  ctx.fillRect(3,8,2,5);   // left stripe
  ctx.fillRect(9,8,2,5);   // right stripe

  // Arms
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,8,3,2);
  ctx.fillRect(11,8,3,2);
  ctx.fillStyle = '#e8b88a';
  ctx.fillRect(0,10,2,2);
  ctx.fillRect(12,10,2,2);

  // Legs/pants
  ctx.fillStyle = '#222855';
  ctx.fillRect(3,13,4,4);
  ctx.fillRect(7,13,4,4);

  // Skates
  ctx.fillStyle = a;
  ctx.fillRect(2,17,5,2);
  ctx.fillRect(7,17,5,2);
  ctx.fillStyle = '#fff';
  ctx.fillRect(2,19,5,1);
  ctx.fillRect(7,19,5,1);
  // wheels
  ctx.fillStyle = '#ccc';
  ctx.fillRect(3,19,1,1);
  ctx.fillRect(5,19,1,1);
  ctx.fillRect(8,19,1,1);
  ctx.fillRect(10,19,1,1);
}

// ── Visualizer ────────────────────────────────────────────────────
const VIZ = 28;
const vizWrap = document.getElementById('vizWrap');
for (let i = 0; i < VIZ; i++) {
  const b = document.createElement('div');
  b.className = 'viz-bar';
  vizWrap.appendChild(b);
}
const bars = vizWrap.querySelectorAll('.viz-bar');

let vizPhase = 0;
function animViz() {
  if (!paused) {
    vizPhase += 0.07;
    const t = TRACKS[curIdx];
    bars.forEach((bar, i) => {
      const f1 = Math.sin(vizPhase + i * 0.38);
      const f2 = Math.sin(vizPhase * 1.61 + i * 0.55);
      const f3 = Math.sin(vizPhase * 0.87 + i * 0.2);
      const h = Math.max(2, Math.abs(f1*11) + Math.abs(f2*6) + Math.abs(f3*4) + Math.random()*2.5);
      bar.style.height = Math.min(h, 24) + 'px';
      // Color gradient: accent on left → teal on right
      const pct = i / VIZ;
      bar.style.background = pct < 0.45 ? t.color : '#00FFCC';
    });
  }
  requestAnimationFrame(animViz);
}
animViz();

// ── Load track ────────────────────────────────────────────────────
function loadTrack(idx) {
  const t = TRACKS[idx];

  const nameEl = document.getElementById('trackName');
  nameEl.textContent = t.name;
  nameEl.classList.toggle('scrolling', t.name.length > 11);

  const artistEl = document.getElementById('artistName');
  artistEl.textContent = t.artist;
  artistEl.style.color = t.color;

  document.getElementById('bpmDisp').textContent = '♪ ' + t.bpm + ' BPM';
  document.getElementById('bpmDisp').style.color = t.color;

  elapsed = 0;
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('timeDisp').textContent = '0:00';

  drawChar(t.color);
  flashTag(t.tag, t.color);
}

// ── Tag flash ─────────────────────────────────────────────────────
function flashTag(text, color) {
  const el = document.getElementById('tagFlash');
  el.textContent = text;
  el.style.color = color;
  el.style.textShadow = '0 0 18px ' + color + ',0 0 40px ' + color;
  el.style.transition = '';
  el.style.opacity = '1';
  setTimeout(() => {
    el.style.transition = 'opacity .5s';
    el.style.opacity = '0';
  }, 600);
}

// ── Station blink ─────────────────────────────────────────────────
let blinkOn = true;
setInterval(() => {
  blinkOn = !blinkOn;
  document.getElementById('stationBlink').style.opacity = blinkOn ? '1' : '.25';
}, 850);

// ── Progress + time ticker ────────────────────────────────────────
setInterval(() => {
  if (paused) return;
  elapsed++;
  const t = TRACKS[curIdx];
  const pct = Math.min(100, (elapsed / t.dur) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  document.getElementById('timeDisp').textContent = m + ':' + String(s).padStart(2,'0');
  if (elapsed >= t.dur) nextTrack();
}, 1000);

// ── Controls ──────────────────────────────────────────────────────
const SPRAY_COLORS = ['#FF0080','#00FFCC','#FFE000','#FF6600','#9B7FE8','#ffffff','#FF3399'];

function sprayEffect(fromEl) {
  const r = fromEl.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top + r.height / 2;
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'spray-p';
    const sz = 3 + Math.random() * 8;
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * 80;
    const dur = (0.38 + Math.random() * 0.32).toFixed(2);
    Object.assign(p.style, {
      width: sz + 'px',
      height: sz + 'px',
      left: (cx - sz / 2) + 'px',
      top: (cy - sz / 2) + 'px',
      background: SPRAY_COLORS[Math.floor(Math.random() * SPRAY_COLORS.length)],
    });
    p.style.setProperty('--tx', (Math.cos(angle) * dist).toFixed(1) + 'px');
    p.style.setProperty('--ty', (Math.sin(angle) * dist).toFixed(1) + 'px');
    p.style.setProperty('--dur', dur + 's');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

function nextTrack() {
  curIdx = (curIdx + 1) % TRACKS.length;
  loadTrack(curIdx);
  sprayEffect(document.getElementById('btnA'));
}

function prevTrack() {
  curIdx = (curIdx - 1 + TRACKS.length) % TRACKS.length;
  loadTrack(curIdx);
  sprayEffect(document.getElementById('btnB'));
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseOverlay').classList.toggle('on', paused);
  setSpeakerPulse(!paused);
  if (paused) {
    bars.forEach(b => { b.style.height = '2px'; });
  }
}

// ── Wire buttons ──────────────────────────────────────────────────
document.getElementById('btnA').addEventListener('click', nextTrack);
document.getElementById('btnB').addEventListener('click', prevTrack);
document.getElementById('btnStart').addEventListener('click', togglePause);
document.getElementById('btnSelect').addEventListener('click', togglePause);
// D-pad: up/left = prev, down/right = next
document.getElementById('dpLeft').addEventListener('click', (e) => {
  // left half = prev, right half = next
  const r = e.currentTarget.getBoundingClientRect();
  if (e.clientX < r.left + r.width / 2) prevTrack(); else nextTrack();
});
document.getElementById('dpUp').addEventListener('click', (e) => {
  const r = e.currentTarget.getBoundingClientRect();
  if (e.clientY < r.top + r.height / 2) prevTrack(); else nextTrack();
});

// ── Keyboard ──────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'a' || e.key === 'A' || e.key === 'x') nextTrack();
  else if (e.key === 'ArrowLeft' || e.key === 'z' || e.key === 'Z') prevTrack();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); togglePause(); }
});

// ── Init ──────────────────────────────────────────────────────────
loadTrack(0);
setSpeakerPulse(true);
</script>
</body>
</html>
