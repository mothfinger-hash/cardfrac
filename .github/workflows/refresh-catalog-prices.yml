name: Refresh Catalog Prices (Pokemon)

# Nightly global Pokemon price refresh — fetches ungraded market prices
# from PriceCharting for every catalog row with a price_source_url,
# updates catalog.current_value, and writes a daily snapshot to
# catalog_price_history (powers the dashboard Price Movers panel).
#
# Runs on a self-hosted Mac runner (no 6h timeout). Uses the Mac's
# system Python 3.11 directly — setup-python action skipped because
# it tries to write to /Users/runner/ which doesn't exist on a
# personal Mac.

on:
  schedule:
    # 05:00 UTC = 1 AM EDT / 12 AM EST. Off-peak UTC window — GitHub
    # Actions scheduled cron is notoriously laggy at top-of-hour during
    # the EU morning (08-10 UTC), where the previous schedule sat. This
    # window is pre-dawn in Europe, so dispatch should fire close to the
    # nominal time. If you want strict 1 AM EST in winter, bump to '0 6 * * *'.
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      tcg:
        description: 'TCG to refresh (default: pokemon)'
        required: false
        default: 'pokemon'
      workers:
        description: 'Parallel HTTP workers (3 is the sweet spot; 4+ trips PC rate limits)'
        required: false
        default: '3'
      limit:
        description: 'Cap rows for a smoke test (0 = no cap)'
        required: false
        default: '0'

jobs:
  refresh:
    runs-on: self-hosted
    timeout-minutes: 1440

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show Python version
        run: python3 --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip --user
          python3 -m pip install requests --user

      - name: Run catalog price refresh
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 refresh_catalog_prices.py \
            --tcg "${{ github.event.inputs.tcg || 'pokemon' }}" \
            --workers "${{ github.event.inputs.workers || '3' }}" \
            --limit "${{ github.event.inputs.limit || '0' }}" \
            --resume
