name: Refresh Catalog Prices

# Catalog price refresh from PriceCharting. Fetches the ungraded market
# price for every catalog row with a pricecharting_id (API mode, fast)
# or a price_source_url (scrape fallback). Updates catalog.current_value
# and writes a daily snapshot to catalog_price_history (powers the
# dashboard Price Movers panel).
#
# Two scheduled runs per day:
#   07:00 UTC = 2 AM EST / 3 AM EDT   →  ALL TCGs (overnight full sweep)
#   17:00 UTC = 12 PM EST / 1 PM EDT  →  Pokemon only (midday refresh)
#
# Why two: Pokemon is the highest-traffic TCG, so a midday refresh
# keeps prices current during peak shopping hours. The other TCGs
# (MTG, YGO, OP, Gundam, DBZ, Topps) only refresh once overnight
# since their prices move more slowly and there are far more rows.
#
# Both schedules use API mode when PRICECHARTING_API_KEY is set,
# which makes the full catalog (~250K rows across all TCGs) finish in
# ~90 min instead of the 4-6 hours scraping used to take.
#
# Runs on a self-hosted Mac runner (no 6h timeout). Uses the Mac's
# system Python 3.11 directly — setup-python action skipped because
# it tries to write to /Users/runner/ which doesn't exist on a
# personal Mac.

on:
  schedule:
    # Note: GitHub cron is in UTC and does NOT auto-adjust for DST.
    # Times here are tuned for EST (winter); during EDT (summer) they
    # fire 1 hour earlier. Acceptable drift for nightly batch jobs.
    - cron: '0 7 * * *'    # 2 AM EST / 3 AM EDT  →  all TCGs (see matrix)
    - cron: '0 17 * * *'   # 12 PM EST / 1 PM EDT →  pokemon only (see matrix)
  workflow_dispatch:
    inputs:
      tcg:
        description: 'TCG to refresh (default: pokemon). Use "all" for every TCG.'
        required: false
        default: 'pokemon'
      workers:
        description: 'Parallel HTTP workers (0 = auto: 20 if API key set, 3 if scrape-only)'
        required: false
        default: '0'
      limit:
        description: 'Cap rows for a smoke test (0 = no cap)'
        required: false
        default: '0'

jobs:
  refresh:
    runs-on: self-hosted
    timeout-minutes: 1440

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show Python version
        run: python3 --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip --user
          python3 -m pip install requests --user

      # Pick which TCG to refresh based on what triggered the workflow:
      #   - 07:00 UTC cron (2 AM EST)  → all TCGs
      #   - 17:00 UTC cron (12 PM EST) → pokemon only
      #   - workflow_dispatch (manual)  → whatever the user typed in inputs
      # github.event.schedule is the cron string of the scheduled run
      # that fired; for manual dispatch it's empty so we fall through
      # to the user-provided input (which itself defaults to 'pokemon').
      - name: Determine TCG scope
        id: tcg
        run: |
          if [ "${{ github.event.schedule }}" = "0 7 * * *" ]; then
            echo "value=all" >> "$GITHUB_OUTPUT"
            echo "Triggered by 07:00 UTC cron → refreshing all TCGs"
          elif [ "${{ github.event.schedule }}" = "0 17 * * *" ]; then
            echo "value=pokemon" >> "$GITHUB_OUTPUT"
            echo "Triggered by 17:00 UTC cron → refreshing pokemon only"
          else
            echo "value=${{ github.event.inputs.tcg || 'pokemon' }}" >> "$GITHUB_OUTPUT"
            echo "Triggered manually → refreshing ${{ github.event.inputs.tcg || 'pokemon' }}"
          fi

      - name: Run catalog price refresh
        env:
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          # PriceCharting API key — when set, refresh uses the JSON API
          # for rows with a pricecharting_id (much faster + more reliable
          # than HTML scraping). Falls back to scraping when unset or for
          # rows missing the id. Add via Repo → Settings → Secrets and
          # variables → Actions → New repository secret.
          PRICECHARTING_API_KEY:  ${{ secrets.PRICECHARTING_API_KEY }}
        run: |
          python3 refresh_catalog_prices.py \
            --tcg "${{ steps.tcg.outputs.value }}" \
            --workers "${{ github.event.inputs.workers || '0' }}" \
            --limit "${{ github.event.inputs.limit || '0' }}" \
            --resume
