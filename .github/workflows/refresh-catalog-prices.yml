name: Refresh Catalog Prices (Pokemon)

# Nightly global Pokemon price refresh — fetches ungraded market prices
# from PriceCharting for every catalog row with a price_source_url,
# updates catalog.current_value, and writes a daily snapshot to
# catalog_price_history (powers the dashboard Price Movers panel).
#
# Schedule: 10:00 UTC = 3am PDT / 2am PST (West Coast).
#
# Runs on a self-hosted runner (your work Mac), so the 6-hour timeout
# that kills hosted runners doesn't apply — the full ~10h run can
# complete in one shot.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL          — your project URL
#   SUPABASE_SERVICE_KEY  — service-role key (bypasses RLS)

on:
  schedule:
    - cron: '0 10 * * *'   # 3am PDT / 2am PST
  workflow_dispatch:
    inputs:
      tcg:
        description: 'TCG to refresh (default: pokemon)'
        required: false
        default: 'pokemon'
      workers:
        description: 'Parallel HTTP workers (3-5 safe; higher → 429s)'
        required: false
        default: '4'
      limit:
        description: 'Cap rows for a smoke test (0 = no cap)'
        required: false
        default: '0'

jobs:
  refresh:
    runs-on: self-hosted           # uses your work Mac
    timeout-minutes: 1440          # 24h — effectively no cap

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run catalog price refresh
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python refresh_catalog_prices.py \
            --tcg "${{ github.event.inputs.tcg || 'pokemon' }}" \
            --workers "${{ github.event.inputs.workers || '4' }}" \
            --limit "${{ github.event.inputs.limit || '0' }}" \
            --resume
