name: Sync TCGCSV (TCGplayer product links)

# Keeps catalog.tcgplayer_product_id + tcgplayer_url current from TCGCSV
# (tcgcsv.com — a once-daily cache of TCGplayer's own API). New sets and
# cards get linked as they appear upstream.
#
# Phase 1: product IDs + URLs from sync_tcgcsv.py.
# Phase 2 (sealed pricing): sync_sealed_prices_tcgcsv.py feeds
# card_prices(source='tcgplayer') for sealed rows, then reseat_tcgplayer.py
# reseats current_value + snapshots catalog_price_history for the whole
# TCGplayer spine (singles + sealed). Both steps run after the sync below.
#
# Etiquette is enforced in the script (custom User-Agent, 100ms spacing,
# and a last-updated.txt guard that no-ops when TCGCSV hasn't rebuilt).
# Human review decisions (manual / skip / missing in tcgplayer_group_map)
# are sticky and never re-fuzzed.
#
# Scheduling:
#   09:00 UTC = 4 AM EST / 5 AM EDT  →  runs AFTER the PriceCharting refresh
#   (07:00 UTC) and the free-API TCGplayer sync (08:00 UTC), so all price
#   sources settle before morning users land. TCGCSV only rebuilds once a
#   day, so a single daily pass is all that's useful.
#
# Runs on the same self-hosted Mac runner as the other price workflows.

on:
  schedule:
    # GitHub cron is UTC and does NOT auto-adjust for DST.
    - cron: '0 9 * * *'    # 4 AM EST / 5 AM EDT
  workflow_dispatch:
    inputs:
      tcg:
        description: 'game_type to sync, or all'
        required: false
        default: 'all'
      groups_only:
        description: 'Only (re)build the group map, skip product backfill'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force:
        description: 'Run even if TCGCSV last-updated.txt has not advanced'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      dry_run:
        description: 'Dry-run: match + report, no DB writes'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  sync:
    runs-on: self-hosted
    timeout-minutes: 45

    # PYTHONUNBUFFERED keeps print() flowing to the Actions log in real
    # time so the run never looks frozen during the rate-limited fetch.
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show Python version
        run: python3 --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip --user
          python3 -m pip install requests --user

      - name: Build script args
        id: args
        run: |
          ARGS="--tcg ${{ github.event.inputs.tcg || 'all' }}"
          if [ "${{ github.event.inputs.groups_only || 'false' }}" = "true" ]; then
            ARGS="$ARGS --groups-only"
          fi
          if [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "value=$ARGS" >> "$GITHUB_OUTPUT"
          echo "Running: python3 -u sync_tcgcsv.py $ARGS"

      - name: Run TCGCSV sync
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # -u forces unbuffered stdout/stderr so progress streams live.
          python3 -u sync_tcgcsv.py ${{ steps.args.outputs.value }}

      # Phase 2 — sealed pricing. Sealed rows (product_type != single) carry a
      # tcgplayer_product_id but no card_prices feed, so their price freezes at
      # import time. Re-pull each one's current tcgcsv market price by product id
      # and upsert card_prices(source='tcgplayer'). Maps by unique product id
      # (Pokemon EN cat 3 + JP cat 85), so coverage is complete, not set-name-
      # dependent. Writes ONLY card_prices — reseat (below) owns current_value.
      - name: Refresh sealed prices from TCGCSV
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 -u sync_sealed_prices_tcgcsv.py --categories 3,85 --commit

      # Finalize the whole TCGplayer spine (singles + sealed — both RPCs are
      # product_type-agnostic): reseat card_prices(source='tcgplayer') into
      # catalog.current_value, then snapshot today's value into
      # catalog_price_history (source='tcgplayer'). Runs LAST, after every
      # card_prices writer (08:00 free-API singles + 09:00 tcgcsv + the sealed
      # step above). if: always() so history still gets a daily point when the
      # tcgcsv last-updated guard no-ops the sync step.
      # PREREQ: reseat_tcgplayer_batch + snapshot_tcgplayer_history_batch must
      # exist in the DB (SQL Migrations/migration_current_value_from_tcgplayer.sql).
      - name: Reseat + snapshot TCGplayer spine
        if: ${{ always() && github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 -u reseat_tcgplayer.py --batch 20000
