<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PathBinder</title>
<style>
  html,body{margin:0;height:100%;background:#0a0e1a;color:#d8e0e8;
    font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:24px}
  h1{color:#fff;font-size:20px;letter-spacing:.04em;margin:0 0 10px}
  p{color:#8a98a8;font-size:14px;line-height:1.6;max-width:300px;margin:0}
  button{margin-top:20px;background:#1AC7A0;color:#0a0e1a;border:none;
    border-radius:10px;padding:12px 30px;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
  <div class="wrap">
    <h1>PathBinder</h1>
    <p>Connect to the internet once to load PathBinder. After that, your
       binder and POS keep working offline.</p>
    <button onclick="location.href='https://pathbinder.gg'">Retry</button>
  </div>
</body>
</html>
