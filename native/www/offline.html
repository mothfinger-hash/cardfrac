<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PathBinder — Offline</title>
<style>
  html,body{margin:0;height:100%;background:#0F0D0A;color:#F2ECD8;font-family:'Space Mono',ui-monospace,monospace;-webkit-font-smoothing:antialiased}
  .wrap{min-height:100%;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
        padding:calc(32px + env(safe-area-inset-top,0px)) calc(24px + env(safe-area-inset-right,0px)) calc(32px + env(safe-area-inset-bottom,0px)) calc(24px + env(safe-area-inset-left,0px))}
  .mark{font-family:'Orbitron',ui-monospace,monospace;font-weight:800;font-size:1.6rem;letter-spacing:.14em;color:#FF5C00;margin-bottom:18px;text-transform:uppercase}
  h1{font-size:1.05rem;margin:0 0 8px;color:#F2ECD8;font-weight:700}
  p{font-size:.82rem;line-height:1.6;color:#8B7A60;max-width:320px;margin:0 0 24px}
  button{font-family:inherit;font-size:.85rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#1a1a1a;background:#FF5C00;border:none;padding:12px 26px;cursor:pointer}
  button:active{filter:brightness(1.12)}
  .dot{display:inline-block;width:7px;height:7px;background:#1AC7A0;border-radius:50%;margin-right:7px;vertical-align:middle;animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">PathBinder</div>
    <h1><span class="dot"></span>You're offline</h1>
    <p>PathBinder needs a connection to load your collection and the marketplace. Check your internet and try again.</p>
    <button onclick="location.href='https://pathbinder.gg/'">Try again</button>
  </div>
</body>
</html>
